llm:
  provider: "ollama"
  base_url: ""
  api_key: ""
  chat_model: "gemma4:26b"
  retrieval_model: "gemma4:26b"
  context_window: 128000

ollama:
  base_url: "http://127.0.0.1:11434"
  chat_model: "gemma4:26b"
  retrieval_model: "gemma4:26b"
  embedding_model: "nomic-embed-text"

api_providers:
  openai:
    label: "OpenAI API"
    base_url: "https://api.openai.com/v1"
    api_key_env:
      - "OPENAI_API_KEY"
    chat_model: "gpt-5.5"
    retrieval_model: "gpt-5.5"
    models:
      - "gpt-5.5"
      - "gpt-5.4"
      - "gpt-5.4-mini"
      - "gpt-5.4-nano"
      - "gpt-5"
      - "gpt-5-mini"
      - "gpt-5-nano"
      - "gpt-4.1"
      - "gpt-4.1-mini"
      - "gpt-4.1-nano"
      - "gpt-4o"
      - "gpt-4o-mini"
      - "gpt-4-turbo"
      - "gpt-4"
      - "gpt-3.5-turbo"
      - "o4-mini"
      - "o3"
      - "o3-mini"
      - "o1"
      - "o1-mini"
  gemini:
    label: "Google Gemini API"
    base_url: "https://generativelanguage.googleapis.com/v1beta/openai"
    native_base_url: "https://generativelanguage.googleapis.com/v1beta"
    reasoning_effort: "low"
    thinking_level: "low"
    thinking_budget: 1024
    min_output_tokens_for_thinking: 1024
    map_llm: false
    api_key_env:
      - "GEMINI_API_KEY"
      - "GOOGLE_API_KEY"
    chat_model: "gemini-3.5-flash"
    retrieval_model: "gemini-3.5-flash"
    models:
      - "gemini-3.5-flash"
      - "gemini-3.1-pro-preview"
      - "gemini-3.1-pro-preview-customtools"
      - "gemini-3-flash-preview"
      - "gemini-3.1-flash-lite"
      - "gemini-3.1-flash-lite-preview"
      - "gemini-flash-latest"
      - "gemini-2.5-pro"
      - "gemini-2.5-flash"
      - "gemini-2.5-flash-lite"
      - "gemini-2.0-flash"
      - "gemini-2.0-flash-lite"
      - "gemini-1.5-pro"
      - "gemini-1.5-flash"
  anthropic:
    label: "Anthropic Claude API"
    base_url: "https://api.anthropic.com/v1"
    api_key_env:
      - "ANTHROPIC_API_KEY"
    chat_model: "claude-sonnet-4-6"
    retrieval_model: "claude-sonnet-4-6"
    models:
      - "claude-opus-4-7"
      - "claude-sonnet-4-6"
      - "claude-haiku-4-5"
      - "claude-haiku-4-5-20251001"
      - "claude-opus-4-6"
      - "claude-sonnet-4-5"
      - "claude-3-7-sonnet-latest"
      - "claude-3-5-sonnet-latest"
      - "claude-3-5-haiku-latest"
      - "claude-3-opus-latest"
  openrouter:
    label: "OpenRouter"
    base_url: "https://openrouter.ai/api/v1"
    api_key_env:
      - "OPENROUTER_API_KEY"
    chat_model: "~anthropic/claude-sonnet-latest"
    retrieval_model: "~anthropic/claude-sonnet-latest"
    models:
      - "~openai/gpt-latest"
      - "~anthropic/claude-sonnet-latest"
      - "~google/gemini-flash-latest"
      - "openai/gpt-5.5"
      - "openai/gpt-5.4-mini"
      - "anthropic/claude-opus-4.7"
      - "anthropic/claude-sonnet-4.6"
      - "google/gemini-3.5-flash"
      - "google/gemini-2.5-pro"
      - "deepseek/deepseek-v4-pro"
      - "x-ai/grok-4.3"
      - "meta-llama/llama-4-maverick"
      - "meta-llama/llama-4-scout"
      - "mistralai/mistral-large-latest"
  groq:
    label: "Groq"
    base_url: "https://api.groq.com/openai/v1"
    api_key_env:
      - "GROQ_API_KEY"
    chat_model: "openai/gpt-oss-120b"
    retrieval_model: "openai/gpt-oss-120b"
    models:
      - "openai/gpt-oss-120b"
      - "openai/gpt-oss-20b"
      - "llama-3.3-70b-versatile"
      - "llama-3.1-8b-instant"
      - "meta-llama/llama-4-scout-17b-16e-instruct"
      - "qwen/qwen3-32b"
      - "groq/compound"
      - "groq/compound-mini"
  deepseek:
    label: "DeepSeek"
    base_url: "https://api.deepseek.com"
    api_key_env:
      - "DEEPSEEK_API_KEY"
    chat_model: "deepseek-v4-pro"
    retrieval_model: "deepseek-v4-pro"
    models:
      - "deepseek-v4-pro"
      - "deepseek-v4-flash"
      - "deepseek-chat"
      - "deepseek-reasoner"
  xai:
    label: "xAI"
    base_url: "https://api.x.ai/v1"
    api_key_env:
      - "XAI_API_KEY"
    chat_model: "grok-4.3"
    retrieval_model: "grok-4.3"
    models:
      - "grok-4.3"
      - "latest"
  mistral:
    label: "Mistral AI"
    base_url: "https://api.mistral.ai/v1"
    api_key_env:
      - "MISTRAL_API_KEY"
    chat_model: "mistral-large-latest"
    retrieval_model: "mistral-large-latest"
    models:
      - "mistral-large-latest"
      - "mistral-medium-latest"
      - "mistral-small-latest"
      - "mistral-small-2501"
      - "ministral-8b-latest"
      - "ministral-3b-latest"
      - "codestral-latest"

codex:
  chat_model: "gpt-5.5"
