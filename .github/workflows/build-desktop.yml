name: Build desktop packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    name: Windows package
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: _internal/app/requirements-desktop.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r _internal/app/requirements-desktop.txt

      - name: Build Windows desktop package
        run: python _internal/app/scripts/package_desktop.py --clean --output-dir dist

      - name: Smoke test packaged app
        shell: pwsh
        run: .\dist\Astro-Note-AI\Astro-Note-AI.exe --smoke-test

      - name: Create Windows distribution archive
        shell: pwsh
        run: |
          Compress-Archive -Path dist\Astro-Note-AI -DestinationPath Astro-Note-AI-windows-x64.zip -Force

      - name: Create Windows self-extracting executable
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://www.7-zip.org/a/7z2600-extra.7z -OutFile 7z-extra.7z
          7z x 7z-extra.7z -o7z-extra -y
          $sfx = Get-ChildItem -Path 7z-extra -Filter 7zSD.sfx -Recurse | Select-Object -First 1
          if (-not $sfx) {
            throw "7zSD.sfx was not found in the 7-Zip extra package."
          }
          Push-Location dist\Astro-Note-AI
          7z a -t7z "$env:GITHUB_WORKSPACE\Astro-Note-AI-windows-x64.7z" * -mx=9
          Pop-Location
          @"
          ;!@Install@!UTF-8!
          Title="Astro-Note AI"
          BeginPrompt="Extract and run Astro-Note AI?"
          RunProgram="Astro-Note-AI.exe"
          ;!@InstallEnd@!
          "@ | Set-Content sfx-config.txt -Encoding utf8NoBOM
          $output = [System.IO.File]::Create("Astro-Note-AI.exe")
          try {
            foreach ($part in @($sfx.FullName, "sfx-config.txt", "Astro-Note-AI-windows-x64.7z")) {
              $input = [System.IO.File]::OpenRead($part)
              try {
                $input.CopyTo($output)
              } finally {
                $input.Dispose()
              }
            }
          } finally {
            $output.Dispose()
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Astro-Note-AI-windows-x64
          path: |
            Astro-Note-AI-windows-x64.zip
            Astro-Note-AI.exe

      - name: Upload Windows release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Astro-Note-AI-windows-x64.zip
            Astro-Note-AI.exe

  macos:
    name: macOS package
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: _internal/app/requirements-desktop.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r _internal/app/requirements-desktop.txt

      - name: Build macOS desktop package
        run: python _internal/app/scripts/package_desktop.py --clean --output-dir dist

      - name: Smoke test packaged app
        run: ./dist/Astro-Note-AI/Astro-Note-AI --smoke-test

      - name: Create macOS distribution files
        run: |
          ditto -c -k --sequesterRsrc --keepParent dist/Astro-Note-AI Astro-Note-AI-macos-arm64.zip
          hdiutil create -volname "Astro-Note-AI" -srcfolder dist/Astro-Note-AI -ov -format UDZO Astro-Note-AI-macos-arm64.dmg

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Astro-Note-AI-macos-arm64
          path: |
            Astro-Note-AI-macos-arm64.zip
            Astro-Note-AI-macos-arm64.dmg

      - name: Upload macOS release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Astro-Note-AI-macos-arm64.zip
            Astro-Note-AI-macos-arm64.dmg
